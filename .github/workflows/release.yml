name: Build & Release

on:
  push:
    branches:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build client
        run: bun run build -- --release-branch=main --build-bytecode
        env:
          GITHUB_OUTPUT: ${{ github.event.release.tag_name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rain-client
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: rain-client
          path: dist/

      - name: Extract version from build.mjs
        id: version
        run: |
          VERSION=$(grep -o 'version:.*"' scripts/build.mjs | sed 's/.*version: "\([^"]*\)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            dist/rain.js
            dist/rain.min.js
            dist/*.hbc
            dist/info.json