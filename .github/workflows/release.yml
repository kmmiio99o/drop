name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Extract version
        id: extract
        run: |
          raw=$(grep -m1 -oE '"v?[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?(-[0-9A-Za-z.-]+)?"' scripts/build.mjs | tr -d '\"' | head -n1 || true)
          version=$(printf '%s' "$raw" | sed -E 's/^v//')
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Prepare tag
        id: prepare
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          version="${{ steps.extract.outputs.version }}"
          tag="${version}"

          echo "tag=${tag}" >> $GITHUB_OUTPUT

          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git config user.name "${GITHUB_ACTOR}"

          if ! git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            git tag -a "${tag}" -m "Release ${tag}"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${tag}"
          else
            echo "Tag ${tag} already exists"
          fi

      - name: Build
        run: bun run build -- --release-branch=main --build-bytecode

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare.outputs.tag }}
          name: Release ${{ steps.prepare.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/rain.js
            dist/rain.min.js
            dist/*.hbc
            dist/info.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}